<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="thyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F84D9E"/>
      <stop offset="100%" stop-color="#FF7475"/>
    </linearGradient>
  </defs>

  <!-- Octagon 1: flat-top, slight rotation -->
  <polygon
    points="100,15 160,40 185,100 160,160 100,185 40,160 15,100 40,40"
    stroke="url(#thyGrad)" stroke-width="4" stroke-linejoin="round" fill="none"
    transform="rotate(-6 100 100)"/>

  <!-- Octagon 2: rotated 22.5° + small offset -->
  <polygon
    points="100,15 160,40 185,100 160,160 100,185 40,160 15,100 40,40"
    stroke="url(#thyGrad)" stroke-width="4" stroke-linejoin="round" fill="none"
    transform="rotate(28 100 100)"/>

  <!-- Letter T (serif, centered) -->
  <text x="100" y="128"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="100"
        font-weight="700"
        fill="url(#thyGrad)">T</text>
</svg>
