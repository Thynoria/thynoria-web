services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - web

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - web

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-https://thynoria.com}
      PORT: "3000"
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
